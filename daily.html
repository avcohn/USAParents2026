const homeUrl="https://avcohn.github.io/USAParents2026/";
const fallbackImg="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1300&q=85";
const days=[
{d:"יום 1",date:"03.05.2026",place:"לוס אנג'לס",title:"נחיתה, התאפסות וכניסה רכה לקליפורניה",text:["היום הראשון מוקדש לנחיתה, התארגנות וכניסה איטית לקצב של קליפורניה. אחרי הגעה ללוס אנג'לס, איסוף רכב והתארגנות ראשונית, הכי נכון לא להעמיס: נסיעה רגועה באזור Beverly Hills ו־West Hollywood, קפה ראשון בעיר, וסיבוב קצר שמכניס אתכם לאווירה בלי להפוך את היום למרתון.","אם יש כוח, אפשר לצאת לסיבוב ערב קל באזור The Grove או Beverly Center, או פשוט לנסוע בין השדרות הרחבות, הדקלים והשלטים הגדולים. המטרה של היום היא אחת: לנחות באמת, להבין שהטיול התחיל, ולשמור אנרגיה ליום הבא."],trivia:"לוס אנג'לס היא עיר ענקית שמורכבת מעשרות שכונות שונות, ולפעמים מעבר בין שכונה לשכונה מרגיש כמו מעבר בין ערים שונות.",food:"Polo Lounge או Musso & Frank Grill · שתי קלאסיקות ותיקות באזור לוס אנג'לס.",map:"Beverly Hills West Hollywood Los Angeles",img:"https://images.unsplash.com/photo-1534190760961-74e8c1c5c3da?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 2",date:"04.05.2026",place:"Hollywood",title:"הוליווד, שדרת הכוכבים והתחלה רשמית של הסיפור",text:["הבוקר נפתח בנסיעה לכיוון הוליווד. מחנים באזור Hollywood Boulevard ויוצאים להליכה קלה בין שדרת הכוכבים, תיאטרון דולבי ו־TCL Chinese Theatre. זה מקום תיירותי מאוד, אבל דווקא בגלל זה הוא עובד: השמות על המדרכה, טביעות הידיים, האנשים שמצלמים מכל כיוון והתחושה שאתם נמצאים בתוך קלישאה אמריקאית במובן הכי טוב שלה.","אחרי השיטוט אפשר לעצור לארוחה קלאסית ב־Musso & Frank Grill, מוסד הוליוודי ותיק עם אווירה של פעם. בהמשך היום כדאי להשאיר זמן לשוטט בלי מטרה: חנות ספרים, קפה, צילום קטן מול שלט רחוב או סתם ישיבה על ספסל. זה יום של כניסה לעולם הקולנוע והמיתולוגיה של LA, בלי לרוץ יותר מדי."],trivia:"שלט Hollywood המקורי נבנה בשנת 1923 ונשא את השם Hollywoodland, כחלק מפרויקט נדל״ן.",food:"Musso & Frank Grill · מוסד הוליוודי היסטורי עם דירוגים חזקים ואווירה קלאסית.",map:"Hollywood Walk of Fame TCL Chinese Theatre Dolby Theatre",img:"https://images.unsplash.com/photo-1580655653885-65763b2597d0?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 3",date:"05.05.2026",place:"Getty · Venice · Santa Monica",title:"אמנות, אוויר ים ורוח חופשית",text:["היום עובר לצד אחר לגמרי של לוס אנג'לס. מתחילים ב־Getty Center, מתחם יפהפה על הגבעות מעל Brentwood. גם מי שלא נכנס עמוק לכל תערוכה נהנה מהאדריכלות, הגנים, המרפסות והנוף שנפתח אל העיר. העלייה ברכבת הקטנה אל המוזיאון כבר מרגישה כמו מעבר לעולם שקט ומדויק יותר.","משם יורדים מערבה אל Venice Beach: טיילת צבעונית, אמני רחוב, גולשים, חנויות מוזרות ואנשים שנראים כאילו הגיעו מסרט דוקומנטרי. ממשיכים ל־Abbot Kinney Boulevard עם בוטיקים, בתי קפה ועיצוב קליפורני, ואז מסיימים בשקיעה בסנטה מוניקה. זה יום שמשלב תרבות, חוף ואווירה חופשית מאוד."],trivia:"Getty Center נפתח ב־1997 ונחשב לאחד המתחמים האדריכליים המרשימים בלוס אנג'לס.",food:"Gjelina ב־Abbot Kinney או Connie & Ted’s באזור West Hollywood.",map:"Getty Center Venice Beach Abbot Kinney Santa Monica Pier",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 4",date:"06.05.2026",place:"Malibu · Santa Barbara",title:"החוף, הדרך והמרחבים שבין לבין",text:["זהו יום היציאה צפונה. עולים על כביש 1 דרך מאליבו, כשהעיר נעלמת לאט לאחור והאוקיינוס מתחיל לתפוס את כל הפריים. עצירה יפה במיוחד היא El Matador Beach: חוף פראי עם סלעים, קשתות אבן ותצפית קצרה שמספיקה כדי להרגיש שהטיול עבר למצב דרך.","משם ממשיכים דרך Ventura ו־Carpinteria עד סנטה ברברה. בעיר עצמה כדאי לחנות ליד State Street ולשוטט ברגל בין הרחובות הנקיים, הבתים עם גגות הרעפים האדומים, החנויות והטיילת. זה יום מעבר, אבל לא יום טכני — זה יום שבו הדרך עצמה היא חלק מהחוויה."],trivia:"סנטה ברברה מכונה לעיתים 'הריביירה האמריקאית' בזכות השילוב של ים, הרים ואדריכלות ספרדית.",food:"The Lark · מסעדה אהובה בסנטה ברברה עם תפריט מקומי ואווירה אלגנטית.",map:"El Matador Beach Malibu State Street Santa Barbara",img:"https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 5",date:"07.05.2026",place:"Morro Bay · Cambria",title:"מפרצים, גבעות ועיירות קטנות",text:["הבוקר ממשיך צפונה דרך נופי חוף, כרמים ואזורים חקלאיים. אפשר לשלב עצירה בסולבנג, עיירה דנית מצוירת עם טחנות רוח, מאפים ואווירה קצת לא צפויה בלב קליפורניה. בהמשך משתלבים שוב לכביש 1, והנוף מתחיל להיות פראי ושקט יותר.","עצירה מרכזית להיום היא Morro Bay, עם הסלע הענק שעומד מול הנמל כמו שומר עתיק. מטיילים לאורך המים, רואים שחפים וכלבי ים, ואז ממשיכים דרך San Simeon עד Cambria. לקראת ערב מומלץ לצאת ל־Moonstone Beach Boardwalk — שביל עץ נעים וקל לאורך החוף, שמתאים לסיום יום רגוע במיוחד."],trivia:"Morro Rock הוא שריד געשי עתיק ונחשב לאחד מסמלי החוף המרכזי של קליפורניה.",food:"Sea Chest Oyster Bar או Robin’s Restaurant באזור Cambria.",map:"Solvang Morro Bay Rock Moonstone Beach Cambria",img:"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 6",date:"08.05.2026",place:"Big Sur",title:"בין סלעים לצוקים — הרוח של ביג סור",text:["זהו אחד הימים היפים ביותר במסלול. יוצאים מקמבריה ונכנסים בהדרגה לאזור Big Sur, שבו הכביש מתפתל בין צוקים, יערות, ים פתוח ונקודות תצפית. כאן לא צריך למהר: עוצרים כשמרגישים, מצלמים, נושמים, וממשיכים לפי הקצב של הנוף.","נקודות מומלצות במיוחד: Ragged Point לתצפית פתיחה, Elephant Seal Vista Point לצפייה בפילי ים, McWay Falls למפל שנופל אל מפרץ טורקיז, ו־Bixby Creek Bridge — הגשר האייקוני של כביש 1. בצהריים אפשר לעצור ב־Big Sur Bakery, ואם יש כוח להוסיף הליכה קצרה ב־Pfeiffer Big Sur State Park בין עצי רדווד ונהר."],trivia:"Bixby Creek Bridge נפתח בשנת 1932 והפך לאחד הגשרים המצולמים ביותר בקליפורניה.",food:"Big Sur Bakery או Nepenthe · שתי עצירות מוכרות מאוד באזור Big Sur.",map:"Big Sur Bixby Creek Bridge McWay Falls Pfeiffer Big Sur State Park",img:"https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 7",date:"09.05.2026",place:"Carmel · Monterey",title:"כרמל ומונטריי — גלריות, ים ולווייתנים באופק",text:["היום מתחיל בקצב רגוע באזור Carmel-by-the-Sea. זו עיירה קטנה ומדויקת, עם בתים נמוכים, גלריות, חנויות ספרים, חלונות ראווה יפים ורחובות שמבקשים הליכה איטית. אין צורך בתוכנית קשיחה — פשוט להסתובב, להיכנס לחנות, לשבת לקפה ולתת למקום לעשות את שלו.","לאחר מכן נוסעים כעשר דקות למונטריי ומבלים באזור Fisherman’s Wharf. בחודש מאי יש סיכוי טוב לצפייה בלווייתנים, ואפשר לבחור בין שייט מסודר של כמה שעות לבין תצפית רגועה מהחוף באזור Pacific Grove. בערב מתאים לסיים בארוחה טובה בעיר, אחרי יום שמרגיש כמו נשימה ארוכה ליד הים."],trivia:"קלינט איסטווד כיהן כראש העיר של Carmel-by-the-Sea בשנים 1986–1988.",food:"Montrio Bistro במונטריי או Lucia באזור Carmel Valley.",map:"Carmel by the Sea Monterey Fisherman's Wharf Pacific Grove",img:"https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 8",date:"10.05.2026",place:"Yosemite",title:"מהחוף אל ההרים — כניסה ללב של יוסמיטי",text:["זהו יום מעבר גדול, אבל כזה שהדרך בו היא חלק מהחוויה. עוזבים את אזור החוף ונוסעים דרך Salinas, Pacheco Pass ועמק סן חואקין. הנוף משתנה בהדרגה: פחות ים, יותר שדות, גבעות, מרחבים פתוחים ותחושה של קליפורניה פנימית ושקטה יותר.","עצירה מומלצת היא Mariposa, עיירה היסטורית קטנה שמתאימה לקפה, דלק ומתיחת רגליים לפני הכניסה לפארק. משם ממשיכים על CA-140 לאורך נהר Merced עד Arch Rock Entrance. אם מגיעים בשעה טובה, כדאי לעשות טיול ראשון קצר ב־Cook’s Meadow, לעבור ב־Sentinel Bridge ולסיים במרכז המבקרים של Yosemite Valley."],trivia:"Arch Rock Entrance היא אחת הכניסות הדרמטיות והמרשימות ביותר ליוסמיטי.",food:"1850 Restaurant במריפוזה או The Ahwahnee Dining Room בתוך יוסמיטי.",map:"Mariposa Yosemite Arch Rock Entrance Cook's Meadow Sentinel Bridge",img:"https://images.unsplash.com/photo-1562310503-a918c4c61e38?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 9",date:"11.05.2026",place:"Yosemite Valley",title:"יוסמיטי ברגליים ובנשימה",text:["זה יום שמוקדש כולו לטבע. מתחילים ב־Lower Yosemite Falls Trail, מסלול קצר, שטוח ונוח שמוביל אל בסיס המפל. במאי הזרימה בדרך כלל מרשימה במיוחד, והתחושה מול קיר המים אדירה. משם ממשיכים ל־Tunnel View, אחת התצפיות הקלאסיות ביותר בפארק, עם El Capitan, Half Dome ו־Bridalveil Fall בפריים אחד.","אחר הצהריים מתאים ל־Mirror Lake Trail או לעצירה רגועה ליד Merced River. לא כל רגע חייב להיות 'מסלול' — לפעמים מספיק לשבת ליד המים, לחלוץ נעליים ולשמוע את הנהר. לקראת ערב אפשר לעבור ב־Pioneer Yosemite History Center באזור Wawona, שמוסיף שכבה היסטורית יפה ליום הטבע."],trivia:"בחודש מאי מפלי יוסמיטי לרוב נמצאים בשיא זרימתם בעקבות הפשרת השלגים.",food:"The Ahwahnee Dining Room · אחת המסעדות ההיסטוריות והמוכרות ביותר בפארק.",map:"Lower Yosemite Fall Tunnel View Mirror Lake Merced River",img:"https://images.unsplash.com/photo-1498855926480-d98e83099315?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 10",date:"12.05.2026",place:"Barstow",title:"מהיער למדבר — עצירה בין עולמות",text:["נפרדים מיוסמיטי ויוצאים לדרך דרומה־מזרחה. בהתחלה עוד יש עצים, שדות ונופים פתוחים של Central Valley, אבל ככל שמתקדמים הנוף מתייבש, הצבעים הופכים זהובים והאוויר מרגיש מדברי יותר. זה יום נסיעה, אבל כזה שמסמן מעבר ברור בין פרק ההרים לפרק המדבר והאורות.","ברסטו היא עצירת ביניים קלאסית בין יוסמיטי ללאס וגאס. אפשר לשלב את Outlets at Barstow לשיטוט קל בין חנויות, או עצירה קצרה ב־Route 66 Mother Road Museum אם רוצים נגיעה בהיסטוריה של הדרכים האמריקאיות. בערב מומלץ לבחור ארוחה פשוטה ומקומית, בלי יומרה, ולהתכונן ליום הבא."],trivia:"ברסטו יושבת על Route 66 ההיסטורית, אחד הסמלים הגדולים של תרבות הרוד־טריפ האמריקאית.",food:"Lola’s Kitchen · מסעדה משפחתית מקומית ופופולרית בברסטו.",map:"Barstow Route 66 Outlets at Barstow",img:"https://images.unsplash.com/photo-1509316785289-025f5b846b35?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 11",date:"13.05.2026",place:"Death Valley · Las Vegas",title:"דרך הצחיחות אל הזוהר",text:["יוצאים מוקדם מברסטו ליום דרמטי דרך Death Valley. חשוב להתחיל עם דלק מלא והרבה מים. הדרך מובילה לנופים קיצוניים: הרים נמוכים, מרחבים יבשים, ערוצי מדבר וצבעים שמשתנים בין צהוב, ורוד וחום. זה לא יום של אטרקציות צפופות — זה יום של תחושה עוצמתית מול טבע קיצוני.","עצירות מומלצות: Zabriskie Point לתצפית קצרה ומרהיבה, Furnace Creek Visitor Center להפסקה ממוזגת ומידע, ו־Badwater Basin — הנקודה הנמוכה בצפון אמריקה. בהמשך היום המדבר מתחלף בהדרגה בשלטי פרסומת, ואז לאס וגאס נפתחת כמו תפאורה נוצצת באמצע שום מקום. בערב מתאים לשלב ארוחה מול המזרקות ומופע."],trivia:"Badwater Basin נמצא כ־86 מטר מתחת לפני הים והוא הנקודה הנמוכה ביותר בצפון אמריקה.",food:"Mon Ami Gabi מול Bellagio או Best Friend by Roy Choi באזור Park MGM.",map:"Zabriskie Point Badwater Basin Las Vegas Strip",img:"https://images.unsplash.com/photo-1605833556294-ea5c7a74f57d?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 12",date:"14.05.2026",place:"Las Vegas",title:"לא עושים כלום — ובדיוק בגלל זה נהנים מהכול",text:["הבוקר בווגאס מתחיל בלי שעון מעורר ובלי נסיעה ארוכה. זה יום שנועד לבחור קצב: ספא, בריכה, קפה איטי או הליכה נינוחה לאורך הסטריפ. באור יום וגאס נראית אחרת — פחות ניאון, יותר תפאורה ענקית שמתגלה בפרטים.","אפשר לעבור בין The Venetian, Caesars Palace, Paris ו־Bellagio, לראות את הגנים והמזרקות, ואז לקפוץ ל־Arts District או ל־Neon Museum לחוויה מקומית ושקטה יותר. אם רוצים קניות, Las Vegas Premium Outlets או Forum Shops נותנים פתרון מושלם. בערב אפשר לבחור ארוחה טובה בלי מופע, או פשוט לשוטט ולתת לעיר לעבוד."],trivia:"רוב הסטריפ המפורסם של לאס וגאס נמצא מחוץ לגבולות העיר הרשמית Las Vegas.",food:"Yardbird, Mon Ami Gabi או Best Friend · שלוש אופציות חזקות באזורים מרכזיים.",map:"Las Vegas Strip Bellagio Venetian Caesars Palace Neon Museum",img:"https://images.unsplash.com/photo-1581351721010-8cf859cb14a4?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 13",date:"15.05.2026",place:"Grand Canyon West",title:"מהעיר אל הטבע הגדול — גרנד קניון ווסט",text:["יוצאים מוקדם מלאס וגאס אל Grand Canyon West. הדרך עוברת דרך מדבר פתוח, אזורים שקטים וגשר סמוך לסכר הובר. ככל שמתרחקים מהעיר, השלטים נעלמים והנוף נהיה רחב, יבש ועמוק יותר. בדרך אפשר לעצור ב־Dolan Springs להתרעננות קצרה.","ב־Grand Canyon West עוברים בין Eagle Point ו־Guano Point. ב־Eagle Point אפשר לעלות ל־Skywalk, גשר זכוכית מעל הקניון, וב־Guano Point הנוף פראי ופתוח יותר, עם תצפית אל נהר הקולורדו. אחר הצהריים חוזרים לווגאס, והמעבר מהשקט של המצוקים לאורות העיר מרגיש כמעט לא אמיתי."],trivia:"Grand Canyon West נמצא בשטח שבט Hualapai, ולא בתוך הפארק הלאומי המרכזי של הגרנד קניון.",food:"La Cave ב־Wynn או Mon Ami Gabi לסיום רגוע אחרי יום מדברי.",map:"Grand Canyon West Skywalk Guano Point Hoover Dam",img:"https://images.unsplash.com/photo-1509316785289-025f5b846b35?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 14",date:"16.05.2026",place:"New Orleans",title:"ממדבר לנשמה — ניו אורלינס בערב של ג'אז",text:["היום מתחיל בלאס וגאס וממשיך בטיסה לניו אורלינס. המעבר חד ומקסים: מהמדבר היבש והניאון אל עיר לחה, צבעונית ומוזיקלית. אחרי הנחיתה והגעה למרכז העיר, נכנסים לאווירה של הרובע הצרפתי — מרפסות ברזל, תריסים צבעוניים, רחובות אבן ומוזיקה שנשמעת גם בלי לחפש אותה.","הערב הראשון בניו אורלינס לא צריך תוכנית גדולה. פשוט יוצאים ברגל, זורמים בין Decatur, Bourbon ו־Frenchmen, עוצרים לארוחה מקומית ומקשיבים לג'אז שבוקע ממועדונים פתוחים. זו עיר שלא חייבים להבין מיד — היא מתגנבת ללב לאט, בשיר."],trivia:"ניו אורלינס נחשבת לאחת מערי הולדת הג'אז, שהתפתח בה בסוף המאה ה־19 ותחילת המאה ה־20.",food:"Coop’s Place, GW Fins או Café Maspero · תלוי אם רוצים פשוט, יוקרתי או מקומי.",map:"French Quarter New Orleans Frenchmen Street Decatur Street",img:"https://images.unsplash.com/photo-1551913902-c92207136625?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 15",date:"17.05.2026",place:"French Quarter · Garden District",title:"הרובע הצרפתי, חשמלית וגנים דרומיים",text:["היום מתחיל בסיור רגלי ברובע הצרפתי: Jackson Square, St. Louis Cathedral, Royal Street, Ursulines Convent ואולי גם Mississippi Riverwalk. זה סיור שמספר על ההיסטוריה הקריאולית, על מוזיקה, וודו, ארכיטקטורה והקסם המשונה של העיר.","בהמשך עוצרים ב־Café du Monde לבנייה וקפה, ואז עולים על החשמלית של St. Charles אל Garden District. שם מטיילים בין אחוזות, עצים דרומיים כבדים ומרפסות מפוסלות. אחר הצהריים אפשר לחזור לרובע, לאכול ארוחה פשוטה וטובה, ולסיים ב־Frenchmen Street או The Spotted Cat Music Club לערב ג'אז אמיתי."],trivia:"הרובע הצרפתי נקרא כך, אבל חלק גדול מהמבנים שבו נבנו דווקא בתקופה הספרדית.",food:"GW Fins, Café Maspero, Daisy Dukes או Café du Monde לקינוח חובה.",map:"Jackson Square St Louis Cathedral Garden District New Orleans Frenchmen Street",img:"https://images.unsplash.com/photo-1514890547357-a9ee288728e0?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 16",date:"18.05.2026",place:"Washington DC",title:"מהג'אז אל הבירה",text:["הבוקר נפרדים מניו אורלינס וטסים לוושינגטון די.סי. המעבר מורגש מיד: מהלחות, המוזיקה והצבע של הדרום אל עיר סימטרית, ממלכתית ומסודרת יותר. אחרי ההגעה לעיר, יוצאים להליכה ראשונה בלי להעמיס.","המסלול הטבעי הוא National Mall: המרחב הפתוח שבין הקונגרס, המוזיאונים והאנדרטאות. היום לא חייבים להיכנס למוזיאונים — מספיק ללכת, לראות את הסמיתסוניאן, את בריכת ההשתקפות, את אנדרטת לינקולן, ואם נשאר אור גם את אנדרטת מרטין לותר קינג. זה ערב של היסטוריה אמריקאית בשיש, מים ושקט."],trivia:"וושינגטון די.סי. אינה מדינה, אלא מחוז פדרלי שהוקם במיוחד כבירת ארצות הברית.",food:"Founding Farmers או Old Ebbitt Grill · שתי אופציות אהובות במרכז העיר.",map:"National Mall Lincoln Memorial White House Washington DC",img:"https://images.unsplash.com/photo-1617581629397-a72507c3de9e?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 17",date:"19.05.2026",place:"Lancaster · Hershey · Lititz",title:"אל לב פנסילבניה — איימיש, שדות ושוקולד",text:["יוצאים מוושינגטון צפונה־מערבה אל Lancaster County, אזור המזוהה עם קהילת האיימיש. הדרך עוברת דרך כבישים נוחים, גבעות ירוקות, חוות ועיירות קטנות. התחנה הראשונה המומלצת היא The Amish Farm and House, לסיור שמציג אורח חיים פשוט, מסורתי ושונה מאוד מהעולם העירוני.","לאחר מכן אפשר לאכול ב־Katie’s Kitchen, מסעדה משפחתית באווירה מקומית, ואז להמשיך ל־Hershey’s Chocolate World. שם נכנסים לעולם שוקולד צבעוני, סיור קצר, חנות ענקית ותחושה מתוקה במיוחד. לקראת ערב ממשיכים לאזור Lititz, עיירה רגועה ויפה שמתאימה לעצירה שקטה."],trivia:"בליטיץ נמצאת Julius Sturgis Pretzel Bakery, שנחשבת למאפיית הבייגלה המסחרית הראשונה בארצות הברית.",food:"Katie’s Kitchen, Bulls Head Public House או Rachel’s Café & Creperie באזור לנקסטר/ליטיץ.",map:"Amish Farm and House Lancaster Hershey Chocolate World Lititz Pennsylvania",img:"https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 18",date:"20.05.2026",place:"Lititz · Edgewater",title:"עוד טעם של ירוק ואז מתקרבים למנהטן",text:["הבוקר מוקדש לפנסילבניה הרגועה: אפשר להיכנס לליטיץ, לבקר ב־Julius Sturgis Pretzel Bakery, לשוטט בין חנויות קטנות ובתי קפה, או להמשיך ל־Ephrata Cloister — אתר היסטורי מהמאה ה־18 עם מבני עץ, גנים וסיפור על קהילה דתית שחיה בקצב אחר.","אם רוצים טבע, Middle Creek Wildlife Management Area נותן הליכה רגועה בין אגמים ושבילים. אחר הצהריים מתחילים לנסוע מזרחה דרך I-78 לכיוון ניו ג'רזי. בדרך אפשר לעצור ב־Clinton, NJ, עיירה קטנה עם גשר מכוסה ואווירה נעימה. לקראת ערב מגיעים לאזור Edgewater, מול קו הרקיע של מנהטן."],trivia:"Edgewater יושבת על הגדה המערבית של נהר ההדסון, ממש מול מנהטן.",food:"HAVEN Riverfront Restaurant · מסעדה עם נוף נהדר לקו הרקיע של ניו יורק.",map:"Lititz Ephrata Cloister Clinton NJ Edgewater Manhattan skyline",img:"https://images.unsplash.com/photo-1490644658840-3f2e3f8c5625?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 19",date:"21.05.2026",place:"Manhattan · SoHo",title:"כניסה למנהטן וטבילת אש ניו־יורקית",text:["הבוקר מתחיל בפרברי ניו ג'רזי, מול נהר ההדסון. נכנסים לרכב, חוצים את הנהר דרך גשר ג'ורג' וושינגטון או מנהרה, והעיר נפתחת בבת אחת: אוטובוסים, מוניות, שלטים, רעש, וקו רקיע שראיתם אלף פעם בתמונות אבל עכשיו הוא אמיתי.","אחרי החזרת הרכב, ממשיכים דרומה לאזור SoHo / Little Italy. היום בנוי להיכרות רכה עם העיר: ארוחת צהריים ב־Rubirosa, שיטוט ברחובות סוהו, חנויות עיצוב, גלריות, Washington Square Park אם יש חשק, וחזרה למנוחה לפני ערב רגוע במסעדה שכונתית. זה יום שמכניס אתכם לניו יורק דרך הרגליים."],trivia:"SoHo קיבלה את שמה מ־South of Houston Street, והיא ידועה בבנייני הברזל היצוק שלה.",food:"Rubirosa או Little Prince · שתיהן אופציות חזקות באזור סוהו.",map:"SoHo New York Washington Square Park Rubirosa",img:"https://images.unsplash.com/photo-1485871981521-5b1fd3805eee?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 20",date:"22.05.2026",place:"Ground Zero · Statue of Liberty",title:"זיכרון, אדריכלות ופסל החירות",text:["היום מתחיל בדרום מנהטן, באתר ההנצחה של אסון התאומים. הבריכות השחורות, שמות הנספים והמים שנופלים פנימה יוצרים רגע שקט מאוד בלב העיר הרועשת. מי שרוצה להעמיק יכול להיכנס למוזיאון 9/11, ואז להמשיך ל־Oculus — תחנת הרכבת והקניון בעיצוב סנטיאגו קלטרווה.","בהמשך יורדים ל־Battery Park ועולים לשיט אל פסל החירות ו־Ellis Island. השיט עצמו נותן תצפית יפהפייה על קו הרקיע של מנהטן, והביקור באליס איילנד מוסיף שכבה מרגשת של סיפור ההגירה לאמריקה. אחר הצהריים חוזרים לסוהו לשיטוט קל, גלריות, חנויות וארוחת ערב טובה."],trivia:"ה־Oculus תוכנן על ידי סנטיאגו קלטרווה, שתכנן גם את גשר המיתרים בירושלים.",food:"Le District, Blue Smoke, Lure Fishbar או Osteria Morini באזור דאונטאון/סוהו.",map:"9/11 Memorial Oculus Battery Park Statue of Liberty Ellis Island",img:"https://images.unsplash.com/photo-1522083165195-3424ed129620?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 21",date:"23.05.2026",place:"Brooklyn · Astoria · Broadway",title:"ברוקלין, קווינס וברודווי",text:["היום מוקדש לניו יורק דרך שכונות. מתחילים בנסיעה בסאבווי לכיוון Williamsburg, שם אפשר לשלב סיור בשכונה היהודית־חסידית ובצד ההיפסטרי של האזור: גרפיטי, בתי קפה, חנויות וינטג' וגלריות. זה יום שמראה את העיר מבפנים, לא רק דרך אתרים מפורסמים.","משם ממשיכים לאסטוריה בקווינס ול־Museum of the Moving Image, מוזיאון קולנוע וטלוויזיה אינטראקטיבי שמתאים גם למי שאוהב תרבות פופ וגם למי שרוצה הפסקה נעימה ממזג האוויר. בערב חוזרים למנהטן למופע ברודווי: The Lion King, Wicked, Hamilton או MJ — תלוי בזמינות ובטעם."],trivia:"Williamsburg משלבת קהילה חסידית גדולה לצד אחת מסצנות האמנות והקפה המפורסמות בניו יורק.",food:"Butler Bake Shop בוויליאמסבורג, Taverna Kyclades באסטוריה או Joe’s Pizza לפני ברודווי.",map:"Williamsburg Brooklyn Museum of the Moving Image Astoria Broadway New York",img:"https://images.unsplash.com/photo-1534430480872-3498386e7856?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 22",date:"24.05.2026",place:"Woodbury · SoHo",title:"קניות, קצב ואור של ערב אחרון",text:["היום מוקדש לקניות. יוצאים בבוקר ממרכז מנהטן בשאטל או אוטובוס לכיוון Woodbury Common Premium Outlets. זהו כפר קניות פתוח עם מעל 200 חנויות, ממותגים יומיומיים ועד מותגי יוקרה. הולכים, מודדים, משווים, עוצרים לקפה, וחוזרים עם שקיות ותחושת ניצחון קטנה.","אחר הצהריים חוזרים למנהטן, מניחים את הקניות ונושמים. בערב מתאים לצאת לארוחה חגיגית אך לא כבדה בסוהו, למשל Balthazar, או להוסיף תרבות אחרונה: Jazz at Lincoln Center, מועדון ג'אז בוילג', או פשוט טיול ערב בין הרחובות, כשהעיר מוארת אבל כבר מרגישה מוכרת יותר."],trivia:"Woodbury Common נחשב לאחד האאוטלטים הפופולריים ביותר בקרב מבקרים בניו יורק.",food:"Balthazar בסוהו או Shake Shack / Chipotle להפסקה זריזה באאוטלט.",map:"Woodbury Common Premium Outlets Balthazar SoHo New York",img:"https://images.unsplash.com/photo-1518391846015-55a9cc003b25?auto=format&fit=crop&w=1300&q=85"},
{d:"יום 23",date:"25.05.2026",place:"New York · Departure",title:"יום אחרון — פרידה איטית מהעיר",text:["היום האחרון מתחיל בלי למהר. אורזים, משאירים מזוודות בשמירה אם צריך, ויוצאים לסיבוב אחרון בעיר. אפשר לפתוח ב־Dominique Ansel Bakery או Balthazar, להמשיך ל־West Village, לשבת ברחוב שקט, להיכנס לחנות ספרים או פשוט להסתכל על ניו יורק כשהיא ממשיכה בלעדיכם.","בהמשך אפשר לשלב את Little Island, הליכה על High Line וארוחה ב־Chelsea Market. אם יש עוד כוח, בוחרים תצפית: Top of the Rock, SUMMIT One Vanderbilt או Edge. לקראת ערב אוספים מזוודות ונוסעים ל־JFK. העיר נשארת בחלון, ואתם מסיימים מסע ארוך, עשיר ומלא רגעים."],trivia:"ניו יורק הייתה הבירה הראשונה של ארצות הברית לזמן קצר בסוף המאה ה־18.",food:"Dominique Ansel Bakery, Chelsea Market או The Modern — תלוי כמה חגיגי רוצים לסיים.",map:"Little Island High Line Chelsea Market JFK Airport",img:"https://images.unsplash.com/photo-1499092346589-b9b6be3e94b2?auto=format&fit=crop&w=1300&q=85"}
];
const cards=document.getElementById("cards"); const nav=document.getElementById("dayNav");
function mapUrl(q){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q)}
function render(){cards.innerHTML=days.map((x,i)=>`<article class="card" id="day-${i+1}" data-search="${(x.d+' '+x.date+' '+x.place+' '+x.title+' '+x.text.join(' ')+' '+x.food).toLowerCase()}"><div class="photo"><img src="${x.img}" alt="${x.place}" loading="lazy" onerror="this.onerror=null;this.src='${fallbackImg}'"></div><div class="content"><div class="meta"><span class="pill gold">${x.d}</span><span class="pill">${x.date}</span><span class="pill">${x.place}</span></div><h3>${x.title}</h3>${x.text.map(p=>`<p>${p}</p>`).join("")}<div class="grid"><div class="box"><b>טריוויה</b>${x.trivia}</div><div class="box"><b>מסעדה מומלצת</b>${x.food}</div></div><div class="action-row"><a class="map-btn" target="_blank" href="${mapUrl(x.map)}">פתח במפות Google</a><a class="home-btn" href="${homeUrl}">חזרה לעמוד הראשי</a></div></div></article>`).join("");nav.innerHTML=days.map((x,i)=>`<button onclick="document.getElementById('day-${i+1}').scrollIntoView({behavior:'smooth',block:'start'})">${i+1}</button>`).join("")}
render();
document.getElementById("searchInput").addEventListener("input",e=>{const q=e.target.value.trim().toLowerCase();document.querySelectorAll(".card").forEach(card=>{card.classList.toggle("hidden",q&&!card.dataset.search.includes(q))})});
</script>
</body>
</html>
