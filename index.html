<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>שורפים את הירושה - USA 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Heebo,Arial,sans-serif;
  background:#e5b75b;
}

/* CONTAINER */
.app{
  max-width:1200px;
  margin:auto;
  background:#f7d98b;
  min-height:100vh;
}

/* HERO - FIXED */
.hero{
  padding:12px;
  background:#b83225;
}

.hero img{
  width:100%;
  height:auto;            /* חשוב — לא חותך */
  object-fit:contain;     /* מציג הכל */
  display:block;
  border:5px solid #32170c;
  border-radius:20px;
  box-shadow:0 8px 0 #6e2819;
  background:#f7d98b;     /* אם יש שוליים */
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:12px;
  background:#f7d98b;
}

.nav a{
  background:#1398a6;
  color:white;
  border:2px solid #32170c;
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  text-decoration:none;
  white-space:nowrap;
  box-shadow:3px 3px 0 #7b351e;
}

/* TITLE */
.title{
  margin:14px;
  padding:10px 14px;
  background:#b83225;
  color:white;
  border:3px solid #32170c;
  border-radius:16px;
  font-size:24px;
  font-weight:900;
  box-shadow:4px 4px 0 #7b351e;
}

/* GRID */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  padding:0 14px 20px;
}

/* CARD */
.card{
  background:#fff1bd;
  border:3px solid #32170c;
  border-radius:18px;
  overflow:hidden;
  box-shadow:5px 5px 0 #7b351e;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-bottom:3px solid #32170c;
}

.body{padding:12px}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.day,.date{
  border:2px solid #32170c;
  border-radius:999px;
  padding:4px 10px;
  font-weight:900;
}

.day{background:#b83225;color:white}
.date{background:#f5bb3d}

h2{
  margin:8px 0;
  font-size:20px;
}

.box{
  background:#fff8db;
  border:2px dashed #8b4a2a;
  border-radius:12px;
  padding:8px;
  margin-top:6px;
  font-size:14px;
}

.box strong{color:#b83225}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:8px;
}

.btn{
  text-align:center;
  background:#1398a6;
  color:white;
  border:2px solid #32170c;
  border-radius:12px;
  padding:8px;
  font-weight:900;
  text-decoration:none;
}

.btn.red{background:#b83225}

/* MOBILE */
@media(max-width:900px){
  .cards{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
  .cards{
    grid-template-columns:1fr;
    padding:0;
  }
  .card{
    margin:12px;
  }
  .card img{height:180px}
}

</style>
</head>

<body>

<div class="app">

<!-- HERO ONLY -->
<header class="hero">
  <img src="hero-family.png" alt="USA 2026">
</header>

<!-- NAV -->
<nav class="nav">
  <a href="#days">המסלול</a>
</nav>

<div class="title" id="days">המסלול היומי</div>

<main class="cards" id="cards"></main>

</div>

<script>

const fallback = "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80";

const days = [
["03.05","לוס אנג'לס","נחיתה והתאקלמות","Sofitel LA","20°–26°C","https://images.unsplash.com/photo-1534190760961-74e8c1c5c3da?auto=format&fit=crop&w=1200&q=80"],
["04.05","לוס אנג'לס","הוליווד","Sofitel LA","20°–26°C","https://images.unsplash.com/photo-1444723121867-7a241cacace9?auto=format&fit=crop&w=1200&q=80"],
["05.05","סנטה מוניקה","חוף","Sofitel LA","17°–22°C","https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"],
["06.05","סנטה ברברה","חוף","Kimpton","15°–22°C","https://images.unsplash.com/photo-1575923825557-7d2d7f113d8e?auto=format&fit=crop&w=1200&q=80"]
];

document.getElementById("cards").innerHTML = days.map((d,i)=>`
<div class="card">
<img src="${d[5]}" onerror="this.src='${fallback}'">
<div class="body">
<div class="top">
<span class="day">יום ${i+1}</span>
<span class="date">${d[0]}</span>
</div>

<h2>${d[1]}</h2>

<div class="box"><strong>מלון:</strong> ${d[3]}</div>
<div class="box"><strong>מזג אוויר:</strong> ${d[4]}</div>

<div class="actions">
<a class="btn">מפה</a>
<a class="btn red">עוד</a>
</div>

</div>
</div>
`).join("");

</script>

</body>
</html>
