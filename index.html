<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שורפים את הירושה - USA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Heebo,Arial,sans-serif;
  background:#e9b95c;
  color:#2b160d;
}
.app{
  max-width:480px;
  margin:auto;
  background:#f7d98b;
  min-height:100vh;
  border-left:4px solid #3b1d10;
  border-right:4px solid #3b1d10;
}
.hero{
  padding:10px;
  background:#d8482f;
}
.hero img{
  width:100%;
  display:block;
  border:4px solid #32170c;
  border-radius:18px;
  box-shadow:0 7px 0 #732819;
}
.intro{
  margin:12px;
  background:#fff1bd;
  border:3px solid #32170c;
  border-radius:18px;
  padding:14px;
  box-shadow:5px 5px 0 #7b351e;
}
.badge{
  display:inline-block;
  background:#1596a3;
  color:white;
  padding:6px 12px;
  border:2px solid #32170c;
  border-radius:999px;
  font-weight:900;
}
h1{
  margin:12px 0 8px;
  color:#b62f24;
  font-size:34px;
  line-height:1.03;
  text-shadow:2px 2px 0 #fff4c3,3px 3px 0 #32170c;
}
.intro p{
  margin:0;
  font-size:16px;
  line-height:1.45;
  font-weight:700;
}
.nav{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:0 12px 12px;
}
.nav a{
  background:#1596a3;
  color:white;
  border:2px solid #32170c;
  border-radius:999px;
  padding:8px 13px;
  font-weight:900;
  white-space:nowrap;
  box-shadow:3px 3px 0 #7b351e;
}
.title{
  margin:12px;
  padding:10px 12px;
  background:#b62f24;
  color:white;
  border:3px solid #32170c;
  border-radius:16px;
  font-size:24px;
  font-weight:900;
  box-shadow:4px 4px 0 #7b351e;
}
.card{
  margin:14px 12px;
  background:#fff1bd;
  border:3px solid #32170c;
  border-radius:20px;
  overflow:hidden;
  box-shadow:6px 6px 0 #7b351e;
}
.illus{
  height:155px;
  border-bottom:3px solid #32170c;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.illus:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 80% 20%,#fff5b8 0 11%,transparent 12%),
    linear-gradient(135deg,var(--c1),var(--c2));
}
.illus:after{
  content:attr(data-icon);
  position:relative;
  font-size:72px;
  filter:drop-shadow(4px 4px 0 rgba(0,0,0,.25));
}
.card-body{padding:13px}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}
.day,.date{
  border:2px solid #32170c;
  border-radius:999px;
  padding:5px 10px;
  font-weight:900;
}
.day{background:#b62f24;color:white}
.date{background:#f5bb3d}
h2{
  margin:10px 0;
  font-size:22px;
  line-height:1.15;
}
.box{
  background:#fff8db;
  border:2px dashed #8b4a2a;
  border-radius:14px;
  padding:9px;
  margin-top:8px;
  font-size:15px;
  line-height:1.45;
}
.box strong{color:#b62f24}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.btn{
  text-align:center;
  background:#1596a3;
  color:white;
  border:2px solid #32170c;
  border-radius:14px;
  padding:9px;
  font-weight:900;
  box-shadow:3px 3px 0 #7b351e;
  text-decoration:none;
}
.btn.red{background:#b62f24}
.hotel{
  margin:10px 12px;
  background:#fff1bd;
  border:3px solid #32170c;
  border-radius:16px;
  padding:11px;
  font-weight:700;
  box-shadow:4px 4px 0 #7b351e;
}
footer{
  text-align:center;
  padding:28px 14px 36px;
  font-weight:900;
}
@media(max-width:390px){
  h1{font-size:30px}
  .actions{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="app">

<header class="hero">

</header>

    מזג אוויר חי ומפה.
  </p>
</section>

<nav class="nav">
  <a href="#days">ימים</a>
  <a href="#hotels">מלונות</a>
  <a href="#end">סיום</a>
</nav>

<div class="title" id="days">המסלול היומי</div>
<main id="cards"></main>

<div class="title" id="hotels">מלונות בפועל</div>
<section id="hotelList"></section>

<footer id="end">
  שורפים את הירושה · USA 2026<br>
  כסף בא והולך, אבל סטוריז נשארים.
</footer>

</div>
