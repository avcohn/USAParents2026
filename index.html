<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>שורפים את הירושה - USA 2026</title>
    
    <meta property="og:title" content="שורפים את הירושה - USA 2026" />
    <meta property="og:description" content="המסלול המלא והמעודכן לטיול המשפחתי בארה״ב" />
    <meta property="og:image" content="hero-family.png" />
    <meta property="og:type" content="website" />

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: #b83225;
            --red2: #7d2419;
            --blue: #118f9c;
            --cream: #fff1bd;
            --cream2: #fff8db;
            --gold: #f4bd45;
            --brown: #32170c;
            --shadow: #7b351e;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: Heebo, Arial, sans-serif;
            background: radial-gradient(circle at top, #ffe29b 0, #e5b75b 45%, #be7535 100%);
            color: #25150c;
        }

        .app {
            width: 100%;
            max-width: 1320px;
            margin: auto;
            background: #f7d98b;
            min-height: 100vh;
        }

        .hero { padding: 14px; background: linear-gradient(135deg, var(--red), #dc6840); }

        .hero img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            border: 5px solid var(--brown);
            border-radius: 26px;
            box-shadow: 0 10px 0 var(--red2), 0 20px 40px rgba(0, 0, 0, .25);
            background: #f7d98b;
        }

        .nav {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
            gap: 10px;
            overflow-x: auto;
            padding: 13px 16px;
            background: rgba(247, 217, 139, .92);
            backdrop-filter: blur(10px);
            border-bottom: 4px solid var(--brown);
        }

        .nav a {
            background: var(--blue);
            color: white;
            border: 2px solid var(--brown);
            border-radius: 999px;
            padding: 9px 16px;
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
            box-shadow: 3px 3px 0 var(--shadow);
        }

        .title {
            margin: 26px 18px 18px;
            padding: 14px 18px;
            background: var(--red);
            color: white;
            border: 4px solid var(--brown);
            border-radius: 20px;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 6px 6px 0 var(--shadow);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 0 20px 34px;
        }

        .card {
            background: var(--cream);
            border: 4px solid var(--brown);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 8px 8px 0 var(--shadow), 0 12px 30px rgba(0, 0, 0, .15);
            transition: .2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 10px 12px 0 var(--shadow), 0 18px 40px rgba(0, 0, 0, .22);
        }

        .card img {
            width: 100%;
            height: 235px;
            object-fit: cover;
            display: block;
            border-bottom: 4px solid var(--brown);
            background: #d6a84d;
        }

        .body { padding: 16px; }

        .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }

        .day, .date { border: 2px solid var(--brown); border-radius: 999px; padding: 5px 11px; font-weight: 900; }

        .day { background: var(--red); color: white; }

        .date { background: var(--gold); }

        h2 { margin: 12px 0; font-size: 25px; line-height: 1.15; }

        .box {
            background: var(--cream2);
            border: 2px dashed #8b4a2a;
            border-radius: 15px;
            padding: 10px;
            margin-top: 9px;
            font-size: 15px;
            line-height: 1.48;
        }

        .box strong { color: var(--red); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 11px; }

        .btn {
            text-align: center;
            background: var(--blue);
            color: white;
            border: 2px solid var(--brown);
            border-radius: 14px;
            padding: 10px;
            font-weight: 900;
            text-decoration: none;
            box-shadow: 3px 3px 0 var(--shadow);
        }

        .btn.red { background: var(--red); }

        footer { text-align: center; padding: 34px 14px 46px; font-weight: 900; font-size: 22px; }

        @media(max-width:1050px) { .cards { grid-template-columns: repeat(2, 1fr); } }

        @media(max-width:640px) {
            .app { max-width: 480px; border-left: 4px solid var(--brown); border-right: 4px solid var(--brown); }
            .nav { position: static; justify-content: flex-start; border-bottom: none; }
            .title { margin: 12px; font-size: 24px; }
            .cards { display: block; padding: 0 0 22px; }
            .card { margin: 15px 12px; border-width: 3px; box-shadow: 5px 5px 0 var(--shadow); }
            .card:hover { transform: none; }
            .card img { height: 190px; }
            h2 { font-size: 22px; }
        }

        @media(max-width:390px) { .actions { grid-template-columns: 1fr; } .card img { height: 170px; } }
    </style>
</head>

<body>
