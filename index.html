<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />

<title>שורפים את הירושה - USA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Heebo,Arial,sans-serif;background:#e5b75b;color:#25150c}
.app{max-width:480px;margin:auto;background:#f7d98b;min-height:100vh;border-left:4px solid #32170c;border-right:4px solid #32170c}
.hero{padding:10px;background:#b83225}
.hero img{width:100%;display:block;border:4px solid #32170c;border-radius:18px;box-shadow:0 7px 0 #6e2819}
.intro,.card{background:#fff1bd;border:3px solid #32170c;border-radius:18px;box-shadow:5px 5px 0 #7b351e}
.intro{margin:12px;padding:14px}
.badge{display:inline-block;background:#1398a6;color:#fff;padding:6px 12px;border:2px solid #32170c;border-radius:999px;font-weight:900}
h1{margin:12px 0 8px;color:#b83225;font-size:34px;line-height:1.03;text-shadow:2px 2px 0 #fff4c3,3px 3px 0 #32170c}
p{margin:0;font-weight:700;line-height:1.45}
.nav{display:flex;gap:8px;overflow:auto;padding:0 12px 12px}
.nav a,.btn{background:#1398a6;color:white;border:2px solid #32170c;border-radius:999px;padding:8px 13px;font-weight:900;text-decoration:none;white-space:nowrap;box-shadow:3px 3px 0 #7b351e}
.title{margin:12px;padding:10px 12px;background:#b83225;color:white;border:3px solid #32170c;border-radius:16px;font-size:24px;font-weight:900;box-shadow:4px 4px 0 #7b351e}
.card{margin:14px 12px;overflow:hidden}
.card img{width:100%;height:185px;object-fit:cover;display:block;border-bottom:3px solid #32170c;background:#d6a84d}
.body{padding:13px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.day,.date{border:2px solid #32170c;border-radius:999px;padding:5px 10px;font-weight:900}
.day{background:#b83225;color:white}.date{background:#f5bb3d}
h2{margin:10px 0;font-size:22px;line-height:1.15}
.box{background:#fff8db;border:2px dashed #8b4a2a;border-radius:14px;padding:9px;margin-top:8px;font-size:15px;line-height:1.45}
.box strong{color:#b83225}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn.red{background:#b83225}
footer{text-align:center;padding:28px 14px 36px;font-weight:900}
@media(max-width:390px){h1{font-size:30px}.actions{grid-template-columns:1fr}.card img{height:165px}}
</style>
</head>

</section>

<nav class="nav">
  <a href="#days">המסלול</a>
  <a href="#end">סיום</a>
</nav>
